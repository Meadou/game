<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Software Engineering & Scrum Reviewer Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07090f;--bg2:#0d1117;--bg3:#161b26;--bg4:#1e2536;
  --accent:#38bdf8;--accent2:#0284c7;--green-a:#22d3ee;
  --gold:#f59e0b;--rose:#f472b6;--lime:#86efac;
  --text:#e2e8f0;--text-dim:#94a3b8;--text-faint:#3d4f6b;
  --border:#1e2d45;--border2:#2a3f5f;
  --green:#22c55e;--green-bg:#071a0f;--green-b:#1a4a2a;
  --red:#ef4444;--red-bg:#1a0707;--red-b:#4a1a1a;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
  padding:2rem 1rem;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 40% at 10% 0%,#0c2a4422 0%,transparent 65%),
    radial-gradient(ellipse 50% 35% at 90% 100%,#0a1f3322 0%,transparent 60%),
    radial-gradient(ellipse 80% 60% at 50% 50%,#050d1a88 0%,transparent 70%);
}
/* grid lines */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(56,189,248,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(56,189,248,0.025) 1px,transparent 1px);
  background-size:40px 40px;
}
#app{position:relative;z-index:1;width:100%;max-width:740px;}

/* ═══ SCREENS ═══ */
.screen{display:none;}
.screen.active{display:block;}

/* ═══ START ═══ */
#start-screen{text-align:center;padding:1rem 0 3rem;}
.crest{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(2.2rem,7vw,4.5rem);
  letter-spacing:0.06em;
  background:linear-gradient(135deg,var(--accent) 0%,var(--green-a) 50%,var(--lime) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 28px rgba(56,189,248,0.45));
  margin-bottom:0.5rem;animation:fadeUp 0.7s ease both;
}
.main-title{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(0.9rem,2.8vw,1.5rem);font-weight:400;
  letter-spacing:0.1em;color:var(--text);
  text-transform:uppercase;margin-bottom:0.4rem;
  animation:fadeUp 0.7s 0.1s ease both;
}
.sub-title{
  font-size:clamp(0.65rem,1.6vw,0.82rem);color:var(--text-dim);
  letter-spacing:0.22em;text-transform:uppercase;
  margin-bottom:0.5rem;animation:fadeUp 0.7s 0.15s ease both;
}
.tagline{
  font-size:0.88rem;color:var(--text-faint);font-style:italic;
  margin-bottom:2rem;animation:fadeUp 0.7s 0.2s ease both;
}
.rule{width:100%;height:1px;background:linear-gradient(to right,transparent,var(--border2),transparent);margin:1.5rem 0;animation:fadeUp 0.7s 0.25s ease both;}

/* topic pills grid */
.civ-grid{
  display:flex;flex-wrap:wrap;gap:0.5rem;
  justify-content:center;margin-bottom:1.5rem;
  animation:fadeUp 0.7s 0.3s ease both;
}
.civ-btn{
  padding:0.38rem 0.9rem;border:1px solid var(--border2);
  background:transparent;color:var(--text-faint);
  cursor:pointer;font-size:0.7rem;letter-spacing:0.1em;
  text-transform:uppercase;font-family:'Share Tech Mono',monospace;
  transition:all 0.2s;border-radius:3px;
}
.civ-btn:hover{border-color:var(--accent);color:var(--text-dim);}
.civ-btn.sel{border-color:var(--accent);background:rgba(56,189,248,0.08);color:var(--accent);}
.count-text{color:var(--text-faint);font-size:0.82rem;font-style:italic;margin-bottom:1.8rem;animation:fadeUp 0.7s 0.35s ease both;font-family:'Share Tech Mono',monospace;}
.start-btn{
  padding:0.95rem 3.5rem;background:transparent;
  border:2px solid var(--accent);color:var(--accent);
  font-family:'Share Tech Mono',monospace;font-size:0.85rem;
  letter-spacing:0.2em;text-transform:uppercase;
  cursor:pointer;transition:all 0.3s;
  animation:fadeUp 0.7s 0.4s ease both;
  box-shadow:0 0 0 rgba(56,189,248,0);
}
.start-btn:hover{background:var(--accent2);color:#fff;border-color:var(--accent2);box-shadow:0 0 30px rgba(56,189,248,0.25);}

/* topic tag colors */
.civ-tag[data-civ="SE Basics"]{color:#38bdf8;border-color:#38bdf855;}
.civ-tag[data-civ="SW Products"]{color:#22d3ee;border-color:#22d3ee55;}
.civ-tag[data-civ="Ethics"]{color:#f472b6;border-color:#f472b655;}
.civ-tag[data-civ="Case Studies"]{color:#86efac;border-color:#86efac55;}
.civ-tag[data-civ="Agile"]{color:#f59e0b;border-color:#f59e0b55;}
.civ-tag[data-civ="Scrum Roles"]{color:#fb923c;border-color:#fb923c55;}
.civ-tag[data-civ="Scrum Ops"]{color:#c084fc;border-color:#c084fc55;}
.civ-tag[data-civ="Artifacts"]{color:#4ade80;border-color:#4ade8055;}
.civ-tag[data-civ="SW Process"]{color:#fbbf24;border-color:#fbbf2455;}
.civ-tag[data-civ="Class Notes"]{color:#a3e635;border-color:#a3e63555;}

/* ═══ QUIZ ═══ */
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.q-counter{font-size:0.68rem;letter-spacing:0.2em;color:var(--text-faint);text-transform:uppercase;font-family:'Share Tech Mono',monospace;}
.q-civ{font-size:0.66rem;letter-spacing:0.1em;text-transform:uppercase;font-family:'Share Tech Mono',monospace;padding:0.18rem 0.65rem;border:1px solid;}
.q-score{font-size:0.78rem;color:var(--gold);font-family:'Share Tech Mono',monospace;}
.progress-bar{width:100%;height:3px;background:var(--bg3);margin-bottom:2rem;border-radius:2px;}
.progress-fill{height:100%;background:linear-gradient(to right,var(--accent2),var(--accent));transition:width 0.5s ease;border-radius:2px;}
.question-box{
  background:var(--bg2);border:1px solid var(--border);
  padding:2rem 1.8rem;margin-bottom:1.3rem;position:relative;overflow:hidden;
}
.question-box::before{
  content:'';position:absolute;top:0;right:0;
  width:120px;height:120px;
  background:radial-gradient(circle,rgba(56,189,248,0.05) 0%,transparent 70%);
  pointer-events:none;
}
.q-accent{position:absolute;top:0;left:0;width:3px;height:100%;}
.q-text{font-size:clamp(0.92rem,2.2vw,1.1rem);line-height:1.8;color:var(--text);padding-left:0.8rem;}
.choices{display:grid;gap:0.6rem;margin-bottom:1.6rem;}
.choice-btn{
  padding:0.82rem 1.3rem;background:var(--bg2);
  border:1px solid var(--border);color:var(--text-dim);
  cursor:pointer;text-align:left;font-size:0.87rem;
  line-height:1.5;font-family:'Inter',sans-serif;
  transition:all 0.18s;display:flex;align-items:center;gap:0.9rem;
}
.choice-btn:hover:not(:disabled){border-color:var(--accent);background:var(--bg3);}
.choice-btn:disabled{cursor:default;}
.choice-btn.correct{background:var(--green-bg);border-color:var(--green);color:#6ee7a0;}
.choice-btn.wrong{background:var(--red-bg);border-color:var(--red);color:#fca5a5;}
.clet{min-width:1.3rem;color:var(--text-faint);font-size:0.68rem;font-family:'Share Tech Mono',monospace;}
.chk{margin-left:auto;}
.feedback-area{text-align:center;}
.fb-msg{font-size:0.88rem;letter-spacing:0.04em;margin-bottom:1.3rem;font-style:italic;}
.fb-msg.correct{color:#6ee7a0;}
.fb-msg.wrong{color:#fca5a5;}
.next-btn{
  padding:0.72rem 2.5rem;background:transparent;
  border:2px solid var(--accent);color:var(--accent);
  font-family:'Share Tech Mono',monospace;font-size:0.78rem;
  letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;
  transition:all 0.25s;
}
.next-btn:hover{background:var(--accent2);color:#fff;border-color:var(--accent2);}

/* ═══ RESULTS ═══ */
#results-screen{text-align:center;}
.res-label{font-size:0.65rem;letter-spacing:0.3em;color:var(--text-faint);text-transform:uppercase;font-family:'Share Tech Mono',monospace;margin-bottom:1rem;}
.res-pct{font-size:clamp(3.5rem,10vw,6rem);font-family:'Share Tech Mono',monospace;text-shadow:0 0 30px currentColor;margin-bottom:0.3rem;}
.res-rank{font-family:'Share Tech Mono',monospace;font-size:1.3rem;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.5rem;}
.res-sub{color:var(--text-dim);font-size:0.95rem;margin-bottom:1.3rem;font-style:italic;}
.res-bar-wrap{width:100%;height:4px;background:var(--bg3);border-radius:2px;margin-bottom:2.5rem;}
.res-bar{height:100%;border-radius:2px;transition:width 1.2s ease;}
.play-again-btn{
  padding:0.78rem 2.5rem;background:transparent;
  border:2px solid var(--accent);color:var(--accent);
  font-family:'Share Tech Mono',monospace;font-size:0.78rem;
  letter-spacing:0.2em;text-transform:uppercase;
  cursor:pointer;transition:all 0.25s;margin-bottom:3rem;
}
.play-again-btn:hover{background:var(--accent2);color:#fff;border-color:var(--accent2);}
.review-hdr{
  font-size:0.63rem;letter-spacing:0.2em;color:var(--text-faint);
  text-transform:uppercase;font-family:'Share Tech Mono',monospace;
  border-bottom:1px solid var(--bg3);padding-bottom:0.5rem;margin-bottom:0.9rem;text-align:left;
}
.rev-item{padding:0.9rem;margin-bottom:0.6rem;text-align:left;border-left-width:3px;border-left-style:solid;}
.rev-item.correct{background:var(--green-bg);border:1px solid var(--green-b);border-left:3px solid var(--green);}
.rev-item.wrong{background:var(--red-bg);border:1px solid var(--red-b);border-left:3px solid var(--red);}
.rev-q{font-size:0.8rem;color:#bae6fd;margin-bottom:0.3rem;line-height:1.5;}
.rev-your{font-size:0.77rem;}
.rev-your.correct{color:#6ee7a0;}
.rev-your.wrong{color:#fca5a5;}
.rev-ans{font-size:0.77rem;color:#6ee7a0;margin-top:0.2rem;}

.topic-sep{width:100%;text-align:center;font-size:0.58rem;letter-spacing:0.25em;color:var(--text-faint);text-transform:uppercase;font-family:'Share Tech Mono',monospace;margin:0.4rem 0 0.1rem;flex-basis:100%;}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeUp 0.32s ease both;}
</style>
</head>
<body>
<div id="app">

<!-- START -->
<div id="start-screen" class="screen active">
  <div class="crest">&lt;/SE&gt;</div>
  <h1 class="main-title">Software Engineering & Scrum</h1>
  <p class="sub-title">Interactive Quiz Reviewer</p>
  <p class="tagline">Ch. 1 Introduction · Process Models · Agile · Scrum Framework · Ethics · Case Studies · Class Notes</p>
  <div class="rule"></div>
  <div class="civ-grid" id="civGrid"></div>
  <p class="count-text" id="countText"></p>
  <button class="start-btn" onclick="startQuiz()">$ run quiz.exe</button>
</div>

<!-- QUIZ -->
<div id="quiz-screen" class="screen">
  <div class="quiz-header">
    <span class="q-counter" id="qCounter"></span>
    <span class="q-civ civ-tag" id="qCiv"></span>
    <span class="q-score" id="qScore"></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
  <div class="question-box">
    <div class="q-accent" id="qAccent"></div>
    <p class="q-text" id="qText"></p>
  </div>
  <div class="choices" id="choicesBox"></div>
  <div class="feedback-area" id="fbArea" style="display:none;">
    <p class="fb-msg" id="fbMsg"></p>
    <button class="next-btn" id="nextBtn" onclick="nextQ()">Next →</button>
  </div>
</div>

<!-- RESULTS -->
<div id="results-screen" class="screen">
  <p class="res-label">// Quiz Complete</p>
  <div class="res-pct" id="resPct"></div>
  <div class="res-rank" id="resRank"></div>
  <p class="res-sub" id="resSub"></p>
  <div class="res-bar-wrap"><div class="res-bar" id="resBar"></div></div>
  <button class="play-again-btn" onclick="goHome()">$ restart</button>
  <div class="review-hdr">// Review Answers</div>
  <div id="reviewList"></div>
</div>

</div>
<script>
const CIV_COLORS={
  "SE Basics":"#38bdf8","SW Products":"#22d3ee","Ethics":"#f472b6",
  "Case Studies":"#86efac","Agile":"#f59e0b",
  "Scrum Roles":"#fb923c","Scrum Ops":"#c084fc","Artifacts":"#4ade80",
  "SW Process":"#fbbf24","Class Notes":"#a3e635"
};

const ALL=[
// ════════════════ SE BASICS ════════════════
{civ:"SE Basics",q:"What is Software Engineering primarily concerned with?",a:"All aspects of software production from specification to maintenance",choices:["Writing and deploying code as efficiently as possible","Designing computer hardware and its interfaces","All aspects of software production from specification to maintenance","Managing databases, networks, and server infrastructure"]},
{civ:"SE Basics",q:"Why are the economies of all developed nations dependent on software?",a:"More and more systems are software-controlled and SW expenditure is a significant fraction of GNP",choices:["Software is cheap to produce and easy to replace across all sectors","Most government operations run exclusively on open-source platforms","More and more systems are software-controlled and SW expenditure is a significant fraction of GNP","Software automation has replaced nearly all forms of manual labor globally"]},
{civ:"SE Basics",q:"What distinguishes Software Engineering from Computer Science?",a:"CS focuses on theory and fundamentals; SE deals with the practicalities of building useful software",choices:["CS is applied in industry while SE is purely academic in focus","Both disciplines are identical — they both focus on writing efficient algorithms","CS focuses on theory and fundamentals; SE deals with the practicalities of building useful software","SE focuses on hardware design while CS handles software development"]},
{civ:"SE Basics",q:"What is the approximate cost split between development and testing?",a:"60% development, 40% testing",choices:["80% development, 20% testing","50% development, 50% testing","60% development, 40% testing","70% development, 30% testing"]},
{civ:"SE Basics",q:"Which is a key challenge facing software engineering today?",a:"Coping with increasing diversity, reduced delivery times, and building trustworthy software",choices:["Reducing the number of programmers needed per project team","Standardizing all software to run only on a single universal platform","Coping with increasing diversity, reduced delivery times, and building trustworthy software","Eliminating internet dependency in all safety-critical systems"]},
{civ:"SE Basics",q:"What are the four fundamental software engineering activities?",a:"Specification, development, validation, and evolution",choices:["Design, coding, testing, and deployment","Specification, development, validation, and evolution","Planning, budgeting, hiring, and documentation","Analysis, design, implementation, and maintenance review"]},
{civ:"SE Basics",q:"What does 'Software Evolution' mean as an SE activity?",a:"Modifying software to reflect changing customer and market requirements",choices:["Upgrading the hardware infrastructure that runs the software","Completely rewriting software using a newer programming language","Modifying software to reflect changing customer and market requirements","Training end users on how to use updated software versions"]},
{civ:"SE Basics",q:"Which essential attribute ensures software does not waste system resources?",a:"Efficiency",choices:["Maintainability","Dependability","Acceptability","Efficiency"]},
{civ:"SE Basics",q:"What does 'Maintainability' mean as a software attribute?",a:"Software should be written so it can evolve to meet changing customer needs",choices:["The software never crashes or loses data under any load condition","Software should be written so it can evolve to meet changing customer needs","The software is hardened against all known security vulnerabilities","The software installs and uninstalls cleanly across all major platforms"]},
{civ:"SE Basics",q:"Why is using SE methods usually cheaper in the long run?",a:"Most costs come from changing software after deployment; SE methods manage this better",choices:["SE methods allow developers to completely skip unit testing phases","SE methods mathematically guarantee zero defects in any production release","Most costs come from changing software after deployment; SE methods manage this better","SE methods eliminate the need for dedicated project managers and documentation"]},
{civ:"SE Basics",q:"What does 'Heterogeneity' refer to as a general issue in software?",a:"Systems must operate as distributed systems across networks with different computer types and mobile devices",choices:["Writing software simultaneously in multiple programming languages on one team","Systems must operate as distributed systems across networks with different computer types and mobile devices","Maintaining multiple development teams spread across different time zones","Using different database engines for separate parts of the same application"]},
{civ:"SE Basics",q:"What does the 'Scale' challenge in software engineering mean?",a:"Software spans from tiny embedded systems all the way up to Internet-scale cloud platforms",choices:["How many lines of code a developer produces per working day","The size of the development team and how their responsibilities are split","Software spans from tiny embedded systems all the way up to Internet-scale cloud platforms","Tracking the total number of active users across all live deployments"]},
{civ:"SE Basics",q:"Which fundamental SE principle avoids rebuilding what already exists?",a:"Software reuse",choices:["Software evolution","Software validation","Software reuse","Software specification"]},
{civ:"SE Basics",q:"What is Cloud Computing in the context of Internet-based SE?",a:"Applications run remotely and users pay per use instead of purchasing a license",choices:["A method for compressing and archiving files on portable storage devices","A technique for developing weather prediction and climate modelling software","Applications run remotely and users pay per use instead of purchasing a license","A practice for building airline reservation and scheduling systems"]},
{civ:"SE Basics",q:"Which application type runs locally with all functionality bundled and needs no network?",a:"Stand-alone application",choices:["Embedded control system","Interactive transaction-based application","Stand-alone application","Batch processing system"]},
{civ:"SE Basics",q:"What are Embedded Control Systems?",a:"Software systems that directly control and manage hardware devices",choices:["Systems that run business logic on remote cloud servers only","Software systems that directly control and manage hardware devices","Systems designed to process large datasets on a fixed nightly schedule","Online entertainment platforms delivered via a web browser to end users"]},

// ════════════════ SW PRODUCTS ════════════════
{civ:"SW Products",q:"What is the key difference between Generic and Customized software products?",a:"Generic products are sold to any customer; customized ones are built for one specific client's needs",choices:["Generic products always cost less; customized products are priced higher due to complexity","Generic products are sold to any customer; customized ones are built for one specific client's needs","Generic products have more features; customized ones are stripped-down for simplicity","Generic products are open-source; customized ones are always closed and proprietary"]},
{civ:"SW Products",q:"For a Generic product, who owns and controls the specification?",a:"The software developer",choices:["The end customer who purchased a license","The software developer","A government regulatory body that approves the product","An independent third-party auditor assigned to the contract"]},
{civ:"SW Products",q:"Which category does an air traffic control system fall under?",a:"Customized product",choices:["Generic off-the-shelf market product","Open-source community-driven product","Customized product","Consumer entertainment system"]},
{civ:"SW Products",q:"Which application type processes large numbers of individual inputs to produce outputs in bulk?",a:"Batch processing systems",choices:["Stand-alone desktop applications","Embedded hardware control systems","Batch processing systems","Real-time entertainment and media streaming systems"]},
{civ:"SW Products",q:"What is a 'System of Systems'?",a:"A larger system built by composing multiple other software systems together",choices:["A very large single monolithic application with many tightly coupled modules","A physical network of interconnected servers and computing hardware","A larger system built by composing multiple other software systems together","A distributed relational database with multiple independent schemas"]},
{civ:"SW Products",q:"Which software attribute means it must be understandable, usable, and compatible with users' other systems?",a:"Acceptability",choices:["Efficiency","Maintainability","Dependability","Acceptability"]},
{civ:"SW Products",q:"What does web-based SE identify as the dominant approach to building systems?",a:"Software reuse — assembling from pre-existing components rather than writing everything fresh",choices:["Writing entirely new code for every feature to ensure full quality control","Software reuse — assembling from pre-existing components rather than writing everything fresh","Avoiding incremental delivery and favouring complete big-bang releases","Restricting all development to vendor-approved proprietary tools and technologies"]},
{civ:"SW Products",q:"What are Integrated Services in iLearn?",a:"Services exposing an API so other services can communicate with them directly",choices:["Services that are only accessible through a standard web browser session","Services requiring users to re-authenticate each time they are accessed","Services exposing an API so other services can communicate with them directly","Services designed to operate fully offline with no network connectivity"]},
{civ:"SW Products",q:"What type of system gathers environmental sensor data and forwards it for processing elsewhere?",a:"Data collection system",choices:["Batch processing system","Interactive entertainment system","Data collection system","System of systems"]},

// ════════════════ ETHICS ════════════════
{civ:"Ethics",q:"Beyond obeying the law, what does ethical behaviour in SE require?",a:"Following principles that are morally correct",choices:["Maximising company profit within whatever legal boundaries exist","Following principles that are morally correct","Keeping all company and client information permanently and totally secret","Avoiding any obligation not spelled out explicitly in a legal contract"]},
{civ:"Ethics",q:"What is the 'Competence' professional responsibility for software engineers?",a:"Not misrepresenting your level of skill or knowingly accepting work you cannot do",choices:["Demonstrating mastery of all major programming languages before taking any contract","Accepting every project offered so as not to disappoint clients or employers","Not misrepresenting your level of skill or knowingly accepting work you cannot do","Holding a postgraduate degree before being permitted on any safety-critical project"]},
{civ:"Ethics",q:"What does the 'Computer Misuse' professional responsibility require?",a:"Not using technical skills to misuse others' computers, whether trivially or seriously",choices:["Always using licensed software on every personal and work machine you operate","Not using technical skills to misuse others' computers, whether trivially or seriously","Keeping all software regularly updated to guard against newly published exploits","Writing complete documentation for every tool or utility script you produce"]},
{civ:"Ethics",q:"How many principles are in the ACM/IEEE Code of Ethics?",a:"Eight",choices:["Four","Six","Eight","Ten"]},
{civ:"Ethics",q:"Which ACM/IEEE principle covers acting in the best interests of both client and employer?",a:"CLIENT AND EMPLOYER",choices:["PUBLIC","PRODUCT","CLIENT AND EMPLOYER","MANAGEMENT"]},
{civ:"Ethics",q:"Which ACM/IEEE principle requires acting consistently with the public interest?",a:"PUBLIC",choices:["PUBLIC","SELF","COLLEAGUES","PROFESSION"]},
{civ:"Ethics",q:"What does the SELF principle in ACM/IEEE require?",a:"Participate in lifelong learning and promote an ethical approach to the profession",choices:["Prioritise mentoring junior colleagues above all other professional duties","Focus exclusively on improving personal technical skills without broader engagement","Participate in lifelong learning and promote an ethical approach to the profession","Withdraw from any professional society whose values conflict with your own"]},
{civ:"Ethics",q:"Which best illustrates an ethical dilemma a software engineer could face?",a:"Your employer ships a safety-critical system before testing is complete",choices:["Choosing between two equally suitable programming languages for a new module","Deciding which project management tool the whole team should adopt this quarter","Your employer ships a safety-critical system before testing is complete","Selecting an open-source licence for a small internal utility script"]},
{civ:"Ethics",q:"What role do professional societies like ACM and IEEE play in SE ethics?",a:"They publish codes of conduct setting standards of behaviour expected of their members",choices:["They regulate and set market rates and pricing for all software services","They publish codes of conduct setting standards of behaviour expected of their members","They review and certify all commercial software products prior to market release","They directly hire software engineers and assign them to specific client engagements"]},
{civ:"Ethics",q:"The 'Intellectual Property Rights' responsibility means engineers must:",a:"Know local IP laws and protect their employer's intellectual property",choices:["Always release their own work publicly under an approved open-source licence","Know local IP laws and protect their employer's intellectual property","Avoid all third-party libraries to remove any possible IP-related conflicts","Study competitors' proprietary code to ensure the team remains technically current"]},

// ════════════════ CASE STUDIES ════════════════
{civ:"Case Studies",q:"What makes the Insulin Pump safety-critical?",a:"Low blood sugar causes brain malfunction, coma, or death; high blood sugar causes lasting organ damage",choices:["It is expensive and requires specialist maintenance under service contracts","It is difficult to miniaturize and demands precision engineering at micro scale","Low blood sugar causes brain malfunction, coma, or death; high blood sugar causes lasting organ damage","It connects to the internet and is vulnerable to remote tampering and attacks"]},
{civ:"Case Studies",q:"What does the Insulin Pump control system do?",a:"Reads blood sugar sensor data, calculates needed insulin dose, and drives a micro-pump",choices:["Monitors heart rate and blood pressure and alerts an emergency call centre","Reads blood sugar sensor data, calculates needed insulin dose, and drives a micro-pump","Dispenses pre-set medication doses at fixed scheduled times regardless of readings","Tracks patient physical activity levels and sends dietary adjustment recommendations"]},

{civ:"Class Notes",q:"What does 'Scale' cover according to class notes?",a:"Number of users, system reach, server and infrastructure choices, and embedded vs. cloud deployment",choices:["Strictly the total number of lines of code written across the entire project","Number of users, system reach, server and infrastructure choices, and embedded vs. cloud deployment","Only the physical dimensions and specifications of the server hardware being used","The size of the development team and how their individual responsibilities are divided"]},
{civ:"Class Notes",q:"How did class notes describe the Scrum Master's role?",a:"Like a coach — their job is to get the team's problems solved and keep everyone productive",choices:["A project manager who assigns specific individual tasks to each developer every morning","Like a coach — their job is to get the team's problems solved and keep everyone productive","The senior developer responsible for reviewing all code before it gets merged","A client-facing representative who presents sprint demos and manages stakeholder expectations"]},
{civ:"Class Notes",q:"How is the Product Backlog ordered according to class notes?",a:"From highest priority at the top to lowest priority at the bottom",choices:["In a random, unordered list that gets sorted only when sprint planning begins","Alphabetically by feature name to make specific items easier to locate quickly","From highest priority at the top to lowest priority at the bottom","Maintained secretly by the Scrum Master with limited visibility for the client"]},
{civ:"Class Notes",q:"Which input is NOT listed for the Sprint Planning Meeting according to class notes?",a:"Developer salary and compensation information",choices:["Team capabilities and available capacity","Current business conditions and strategic priorities","Available technology and development tooling","Developer salary and compensation information"]},
{civ:"Class Notes",q:"What did class notes say about adding features while software is live?",a:"You should not stop the software just to add features — it should keep running during improvements",choices:["Every significant new feature requires a complete system shutdown and fresh redeployment","You should not stop the software just to add features — it should keep running during improvements","New features must only ever be added during a scheduled annual major version release","Any change to live software requires a full regression test cycle before it can go in"]},
{civ:"Class Notes",q:"What is reviewed and presented at the end of a Sprint Review Meeting per class notes?",a:"The Sprint Backlog results — what the team completed during the sprint",choices:["The team is formally dissolved and immediately reassigned to entirely new projects","The Sprint Backlog results — what the team completed during the sprint","All product requirements are frozen and permanently locked for the rest of the project","The Scrum Master writes and distributes a detailed sprint performance report to all stakeholders"]},
{civ:"Class Notes",q:"What Sprint duration range did class notes specify?",a:"Minimum 1 week, maximum 4 weeks",choices:["Minimum 1 day, maximum 1 week","Minimum 2 weeks, maximum 6 weeks","Minimum 1 week, maximum 4 weeks","Exactly 2 weeks for every single sprint without exception"]},
{civ:"Class Notes",q:"How is the Kickoff Meeting described in class notes?",a:"A special Sprint Planning Meeting held before the very first sprint officially starts",choices:["The wrap-up meeting held with all stakeholders right after the project's final release","A special Sprint Planning Meeting held before the very first sprint officially starts","The daily standup meeting referred to by an alternate name in some Scrum teams","A stakeholder-only meeting where the client presents the complete product requirements"]},
];
const TOPICS=["All","SE Basics","SW Products","Ethics","Case Studies","SW Process","Agile","Scrum Roles","Scrum Ops","Artifacts","Class Notes"];
const LETS=["A","B","C","D"];
let selTopic="All",questions=[],cur=0,score=0,answers=[],answered=false;

function shuffle(a){return[...a].sort(()=>Math.random()-0.5);}

function buildGrid(){
  const g=document.getElementById('civGrid');
  TOPICS.forEach(c=>{
    if(c==="SE Basics"){
      const s=document.createElement('div');
      s.className='topic-sep';s.textContent='— Software Engineering Ch.1 —';
      g.appendChild(s);
    }
    if(c==="SW Process"){
      const s=document.createElement('div');
      s.className='topic-sep';s.textContent='— Process Models —';
      g.appendChild(s);
    }
    if(c==="Agile"){
      const s=document.createElement('div');
      s.className='topic-sep';s.textContent='— Agile & Scrum —';
      g.appendChild(s);
    }
    if(c==="Class Notes"){
      const s=document.createElement('div');
      s.className='topic-sep';s.textContent='— Class Notes Extras —';
      g.appendChild(s);
    }
    const b=document.createElement('button');
    b.className='civ-btn'+(c==='All'?' sel':'');
    b.textContent=c;
    b.onclick=()=>{
      selTopic=c;
      document.querySelectorAll('.civ-btn').forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel');updateCount();
    };
    g.appendChild(b);
  });
  updateCount();
}

function updateCount(){
  const pool=selTopic==='All'?ALL:ALL.filter(q=>q.civ===selTopic);
  document.getElementById('countText').textContent='// '+pool.length+' questions loaded';
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function startQuiz(){
  const pool=selTopic==='All'?ALL:ALL.filter(q=>q.civ===selTopic);
  questions=shuffle(pool).map(q=>({...q,choices:shuffle(q.choices)}));
  cur=0;score=0;answers=[];answered=false;
  showScreen('quiz-screen');renderQ();
}

function renderQ(){
  answered=false;
  const q=questions[cur];
  const col=CIV_COLORS[q.civ]||'#38bdf8';
  document.getElementById('qCounter').textContent=(cur+1)+' / '+questions.length;
  const civEl=document.getElementById('qCiv');
  civEl.textContent=q.civ;civEl.setAttribute('data-civ',q.civ);
  document.getElementById('qScore').textContent=score+' pts';
  document.getElementById('qAccent').style.background=col;
  document.getElementById('progFill').style.width=(cur/questions.length*100)+'%';
  document.getElementById('qText').textContent=q.q;
  document.getElementById('fbArea').style.display='none';
  const box=document.getElementById('choicesBox');
  box.innerHTML='';
  q.choices.forEach((c,i)=>{
    const b=document.createElement('button');
    b.className='choice-btn fade-in';
    b.style.animationDelay=(i*0.07)+'s';
    b.innerHTML='<span class="clet">'+LETS[i]+'</span>'+c;
    b.onclick=()=>handleChoice(c,b,q);
    box.appendChild(b);
  });
}

function handleChoice(choice,btn,q){
  if(answered)return;
  answered=true;
  const ok=choice===q.a;
  if(ok)score++;
  answers.push({q:q.q,chosen:choice,correct:q.a,ok,civ:q.civ});
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=true;
    const txt=b.textContent.replace(/^[A-D]/,'').trim();
    if(txt===q.a){b.classList.add('correct');b.innerHTML+='<span class="chk">✓</span>';}
    else if(b===btn&&!ok){b.classList.add('wrong');b.innerHTML+='<span class="chk">✗</span>';}
  });
  const fb=document.getElementById('fbArea');
  const msg=document.getElementById('fbMsg');
  const nb=document.getElementById('nextBtn');
  fb.style.display='block';
  if(ok){msg.textContent='Correct!';msg.className='fb-msg correct';}
  else{msg.textContent='Incorrect. The answer was: '+q.a;msg.className='fb-msg wrong';}
  nb.textContent=(cur+1>=questions.length)?'See Results →':'Next →';
}

function nextQ(){
  if(cur+1>=questions.length){showResults();}
  else{cur++;renderQ();}
}

function showResults(){
  showScreen('results-screen');
  const pct=Math.round(score/questions.length*100);
  const rank=pct>=95?"Senior Engineer":pct>=85?"Software Architect":pct>=75?"Mid-Level Dev":pct>=60?"Junior Dev":pct>=40?"Intern":"Boot Camp Day 1";
  const col=pct>=95?"#38bdf8":pct>=85?"#22d3ee":pct>=75?"#86efac":pct>=60?"#f59e0b":pct>=40?"#94a3b8":"#3d4f6b";
  const pe=document.getElementById('resPct');
  pe.textContent=pct+'%';pe.style.color=col;
  const re=document.getElementById('resRank');
  re.textContent=rank;re.style.color=col;
  document.getElementById('resSub').textContent=score+' of '+questions.length+' correct';
  setTimeout(()=>{
    const b=document.getElementById('resBar');
    b.style.background='linear-gradient(to right,var(--accent2),'+col+')';
    b.style.width=pct+'%';
  },100);
  const list=document.getElementById('reviewList');
  list.innerHTML='';
  answers.forEach((a,i)=>{
    const d=document.createElement('div');
    d.className='rev-item '+(a.ok?'correct':'wrong');
    d.innerHTML=`<div class="rev-q">${i+1}. [${a.civ}] ${a.q}</div>
      <div class="rev-your ${a.ok?'correct':'wrong'}">${a.ok?'✓':'✗'} Your answer: ${a.chosen}</div>
      ${!a.ok?`<div class="rev-ans">✓ Correct: ${a.correct}</div>`:''}`;
    list.appendChild(d);
  });
}

function goHome(){showScreen('start-screen');}
buildGrid();
</script>
