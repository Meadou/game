<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Software Engineering & Scrum Reviewer Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07090f;--bg2:#0d1117;--bg3:#161b26;--bg4:#1e2536;
  --accent:#38bdf8;--accent2:#0284c7;--green-a:#22d3ee;
  --gold:#f59e0b;--rose:#f472b6;--lime:#86efac;
  --text:#e2e8f0;--text-dim:#94a3b8;--text-faint:#3d4f6b;
  --border:#1e2d45;--border2:#2a3f5f;
  --green:#22c55e;--green-bg:#071a0f;--green-b:#1a4a2a;
  --red:#ef4444;--red-bg:#1a0707;--red-b:#4a1a1a;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
  padding:2rem 1rem;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 40% at 10% 0%,#0c2a4422 0%,transparent 65%),
    radial-gradient(ellipse 50% 35% at 90% 100%,#0a1f3322 0%,transparent 60%),
    radial-gradient(ellipse 80% 60% at 50% 50%,#050d1a88 0%,transparent 70%);
}
/* grid lines */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(56,189,248,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(56,189,248,0.025) 1px,transparent 1px);
  background-size:40px 40px;
}
#app{position:relative;z-index:1;width:100%;max-width:740px;}

/* ═══ SCREENS ═══ */
.screen{display:none;}
.screen.active{display:block;}

/* ═══ START ═══ */
#start-screen{text-align:center;padding:1rem 0 3rem;}
.crest{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(2.2rem,7vw,4.5rem);
  letter-spacing:0.06em;
  background:linear-gradient(135deg,var(--accent) 0%,var(--green-a) 50%,var(--lime) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 28px rgba(56,189,248,0.45));
  margin-bottom:0.5rem;animation:fadeUp 0.7s ease both;
}
.main-title{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(0.9rem,2.8vw,1.5rem);font-weight:400;
  letter-spacing:0.1em;color:var(--text);
  text-transform:uppercase;margin-bottom:0.4rem;
  animation:fadeUp 0.7s 0.1s ease both;
}
.sub-title{
  font-size:clamp(0.65rem,1.6vw,0.82rem);color:var(--text-dim);
  letter-spacing:0.22em;text-transform:uppercase;
  margin-bottom:0.5rem;animation:fadeUp 0.7s 0.15s ease both;
}
.tagline{
  font-size:0.88rem;color:var(--text-faint);font-style:italic;
  margin-bottom:2rem;animation:fadeUp 0.7s 0.2s ease both;
}
.rule{width:100%;height:1px;background:linear-gradient(to right,transparent,var(--border2),transparent);margin:1.5rem 0;animation:fadeUp 0.7s 0.25s ease both;}

/* topic pills grid */
.civ-grid{
  display:flex;flex-wrap:wrap;gap:0.5rem;
  justify-content:center;margin-bottom:1.5rem;
  animation:fadeUp 0.7s 0.3s ease both;
}
.civ-btn{
  padding:0.38rem 0.9rem;border:1px solid var(--border2);
  background:transparent;color:var(--text-faint);
  cursor:pointer;font-size:0.7rem;letter-spacing:0.1em;
  text-transform:uppercase;font-family:'Share Tech Mono',monospace;
  transition:all 0.2s;border-radius:3px;
}
.civ-btn:hover{border-color:var(--accent);color:var(--text-dim);}
.civ-btn.sel{border-color:var(--accent);background:rgba(56,189,248,0.08);color:var(--accent);}
.count-text{color:var(--text-faint);font-size:0.82rem;font-style:italic;margin-bottom:1.8rem;animation:fadeUp 0.7s 0.35s ease both;font-family:'Share Tech Mono',monospace;}
.start-btn{
  padding:0.95rem 3.5rem;background:transparent;
  border:2px solid var(--accent);color:var(--accent);
  font-family:'Share Tech Mono',monospace;font-size:0.85rem;
  letter-spacing:0.2em;text-transform:uppercase;
  cursor:pointer;transition:all 0.3s;
  animation:fadeUp 0.7s 0.4s ease both;
  box-shadow:0 0 0 rgba(56,189,248,0);
}
.start-btn:hover{background:var(--accent2);color:#fff;border-color:var(--accent2);box-shadow:0 0 30px rgba(56,189,248,0.25);}

/* topic tag colors */
.civ-tag[data-civ="SE Basics"]{color:#38bdf8;border-color:#38bdf855;}
.civ-tag[data-civ="SW Products"]{color:#22d3ee;border-color:#22d3ee55;}
.civ-tag[data-civ="Ethics"]{color:#f472b6;border-color:#f472b655;}
.civ-tag[data-civ="Case Studies"]{color:#86efac;border-color:#86efac55;}
.civ-tag[data-civ="Agile"]{color:#f59e0b;border-color:#f59e0b55;}
.civ-tag[data-civ="Scrum Roles"]{color:#fb923c;border-color:#fb923c55;}
.civ-tag[data-civ="Scrum Ops"]{color:#c084fc;border-color:#c084fc55;}
.civ-tag[data-civ="Artifacts"]{color:#4ade80;border-color:#4ade8055;}
.civ-tag[data-civ="SW Process"]{color:#fbbf24;border-color:#fbbf2455;}
.civ-tag[data-civ="Class Notes"]{color:#a3e635;border-color:#a3e63555;}

/* ═══ QUIZ ═══ */
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.q-counter{font-size:0.68rem;letter-spacing:0.2em;color:var(--text-faint);text-transform:uppercase;font-family:'Share Tech Mono',monospace;}
.q-civ{font-size:0.66rem;letter-spacing:0.1em;text-transform:uppercase;font-family:'Share Tech Mono',monospace;padding:0.18rem 0.65rem;border:1px solid;}
.q-score{font-size:0.78rem;color:var(--gold);font-family:'Share Tech Mono',monospace;}
.progress-bar{width:100%;height:3px;background:var(--bg3);margin-bottom:2rem;border-radius:2px;}
.progress-fill{height:100%;background:linear-gradient(to right,var(--accent2),var(--accent));transition:width 0.5s ease;border-radius:2px;}
.question-box{
  background:var(--bg2);border:1px solid var(--border);
  padding:2rem 1.8rem;margin-bottom:1.3rem;position:relative;overflow:hidden;
}
.question-box::before{
  content:'';position:absolute;top:0;right:0;
  width:120px;height:120px;
  background:radial-gradient(circle,rgba(56,189,248,0.05) 0%,transparent 70%);
  pointer-events:none;
}
.q-accent{position:absolute;top:0;left:0;width:3px;height:100%;}
.q-text{font-size:clamp(0.92rem,2.2vw,1.1rem);line-height:1.8;color:var(--text);padding-left:0.8rem;}
.choices{display:grid;gap:0.6rem;margin-bottom:1.6rem;}
.choice-btn{
  padding:0.82rem 1.3rem;background:var(--bg2);
  border:1px solid var(--border);color:var(--text-dim);
  cursor:pointer;text-align:left;font-size:0.87rem;
  line-height:1.5;font-family:'Inter',sans-serif;
  transition:all 0.18s;display:flex;align-items:center;gap:0.9rem;
}
.choice-btn:hover:not(:disabled){border-color:var(--accent);background:var(--bg3);}
.choice-btn:disabled{cursor:default;}
.choice-btn.correct{background:var(--green-bg);border-color:var(--green);color:#6ee7a0;}
.choice-btn.wrong{background:var(--red-bg);border-color:var(--red);color:#fca5a5;}
.clet{min-width:1.3rem;color:var(--text-faint);font-size:0.68rem;font-family:'Share Tech Mono',monospace;}
.chk{margin-left:auto;}
.feedback-area{text-align:center;}
.fb-msg{font-size:0.88rem;letter-spacing:0.04em;margin-bottom:1.3rem;font-style:italic;}
.fb-msg.correct{color:#6ee7a0;}
.fb-msg.wrong{color:#fca5a5;}
.next-btn{
  padding:0.72rem 2.5rem;background:transparent;
  border:2px solid var(--accent);color:var(--accent);
  font-family:'Share Tech Mono',monospace;font-size:0.78rem;
  letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;
  transition:all 0.25s;
}
.next-btn:hover{background:var(--accent2);color:#fff;border-color:var(--accent2);}

/* ═══ RESULTS ═══ */
#results-screen{text-align:center;}
.res-label{font-size:0.65rem;letter-spacing:0.3em;color:var(--text-faint);text-transform:uppercase;font-family:'Share Tech Mono',monospace;margin-bottom:1rem;}
.res-pct{font-size:clamp(3.5rem,10vw,6rem);font-family:'Share Tech Mono',monospace;text-shadow:0 0 30px currentColor;margin-bottom:0.3rem;}
.res-rank{font-family:'Share Tech Mono',monospace;font-size:1.3rem;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.5rem;}
.res-sub{color:var(--text-dim);font-size:0.95rem;margin-bottom:1.3rem;font-style:italic;}
.res-bar-wrap{width:100%;height:4px;background:var(--bg3);border-radius:2px;margin-bottom:2.5rem;}
.res-bar{height:100%;border-radius:2px;transition:width 1.2s ease;}
.play-again-btn{
  padding:0.78rem 2.5rem;background:transparent;
  border:2px solid var(--accent);color:var(--accent);
  font-family:'Share Tech Mono',monospace;font-size:0.78rem;
  letter-spacing:0.2em;text-transform:uppercase;
  cursor:pointer;transition:all 0.25s;margin-bottom:3rem;
}
.play-again-btn:hover{background:var(--accent2);color:#fff;border-color:var(--accent2);}
.review-hdr{
  font-size:0.63rem;letter-spacing:0.2em;color:var(--text-faint);
  text-transform:uppercase;font-family:'Share Tech Mono',monospace;
  border-bottom:1px solid var(--bg3);padding-bottom:0.5rem;margin-bottom:0.9rem;text-align:left;
}
.rev-item{padding:0.9rem;margin-bottom:0.6rem;text-align:left;border-left-width:3px;border-left-style:solid;}
.rev-item.correct{background:var(--green-bg);border:1px solid var(--green-b);border-left:3px solid var(--green);}
.rev-item.wrong{background:var(--red-bg);border:1px solid var(--red-b);border-left:3px solid var(--red);}
.rev-q{font-size:0.8rem;color:#bae6fd;margin-bottom:0.3rem;line-height:1.5;}
.rev-your{font-size:0.77rem;}
.rev-your.correct{color:#6ee7a0;}
.rev-your.wrong{color:#fca5a5;}
.rev-ans{font-size:0.77rem;color:#6ee7a0;margin-top:0.2rem;}

.topic-sep{width:100%;text-align:center;font-size:0.58rem;letter-spacing:0.25em;color:var(--text-faint);text-transform:uppercase;font-family:'Share Tech Mono',monospace;margin:0.4rem 0 0.1rem;flex-basis:100%;}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeUp 0.32s ease both;}
</style>
</head>
<body>
<div id="app">

<!-- START -->
<div id="start-screen" class="screen active">
  <div class="crest">&lt;/SE&gt;</div>
  <h1 class="main-title">Software Engineering & Scrum</h1>
  <p class="sub-title">Interactive Quiz Reviewer</p>
  <p class="tagline">Ch. 1 Introduction · Process Models · Agile · Scrum Framework · Ethics · Case Studies · Class Notes</p>
  <div class="rule"></div>
  <div class="civ-grid" id="civGrid"></div>
  <p class="count-text" id="countText"></p>
  <button class="start-btn" onclick="startQuiz()">$ run quiz.exe</button>
</div>

<!-- QUIZ -->
<div id="quiz-screen" class="screen">
  <div class="quiz-header">
    <span class="q-counter" id="qCounter"></span>
    <span class="q-civ civ-tag" id="qCiv"></span>
    <span class="q-score" id="qScore"></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
  <div class="question-box">
    <div class="q-accent" id="qAccent"></div>
    <p class="q-text" id="qText"></p>
  </div>
  <div class="choices" id="choicesBox"></div>
  <div class="feedback-area" id="fbArea" style="display:none;">
    <p class="fb-msg" id="fbMsg"></p>
    <button class="next-btn" id="nextBtn" onclick="nextQ()">Next →</button>
  </div>
</div>

<!-- RESULTS -->
<div id="results-screen" class="screen">
  <p class="res-label">// Quiz Complete</p>
  <div class="res-pct" id="resPct"></div>
  <div class="res-rank" id="resRank"></div>
  <p class="res-sub" id="resSub"></p>
  <div class="res-bar-wrap"><div class="res-bar" id="resBar"></div></div>
  <button class="play-again-btn" onclick="goHome()">$ restart</button>
  <div class="review-hdr">// Review Answers</div>
  <div id="reviewList"></div>
</div>

</div>
<script>
const CIV_COLORS={
  "SE Basics":"#38bdf8","SW Products":"#22d3ee","Ethics":"#f472b6",
  "Case Studies":"#86efac","Agile":"#f59e0b",
  "Scrum Roles":"#fb923c","Scrum Ops":"#c084fc","Artifacts":"#4ade80",
  "SW Process":"#fbbf24","Class Notes":"#a3e635"
};

const ALL=[
// ════════════════ SE BASICS ════════════════
{civ:"SE Basics",q:"What is Software Engineering primarily concerned with?",a:"All aspects of software production from specification to maintenance",choices:["Writing code as fast as possible","Designing computer hardware","All aspects of software production from specification to maintenance","Managing databases and networks"]},
{civ:"SE Basics",q:"Why are the economies of all developed nations dependent on software?",a:"More and more systems are software controlled and software expenditure represents a significant fraction of GNP",choices:["Software is cheap and easy to produce","Only governments use software systems","More and more systems are software controlled and software expenditure represents a significant fraction of GNP","Software replaced all manual labor"]},
{civ:"SE Basics",q:"What is the difference between Software Engineering and Computer Science?",a:"Computer Science focuses on theory and fundamentals; Software Engineering is concerned with the practicalities of developing useful software",choices:["They are the same discipline","Computer Science focuses on theory and fundamentals; Software Engineering is concerned with the practicalities of developing useful software","Software Engineering focuses on hardware design","Computer Science is only for academics"]},
{civ:"SE Basics",q:"What percentage of software costs are roughly development costs?",a:"60% development, 40% testing",choices:["80% development, 20% testing","50% development, 50% testing","60% development, 40% testing","70% development, 30% testing"]},
{civ:"SE Basics",q:"Which of the following is a key challenge facing software engineering?",a:"Coping with increasing diversity, reduced delivery times, and developing trustworthy software",choices:["Reducing the number of programmers","Building only small systems","Coping with increasing diversity, reduced delivery times, and developing trustworthy software","Avoiding use of the internet"]},
{civ:"SE Basics",q:"What are the four fundamental software engineering activities?",a:"Specification, development, validation, and evolution",choices:["Design, coding, testing, deployment","Specification, development, validation, and evolution","Planning, budgeting, hiring, firing","Analysis, design, implementation, documentation"]},
{civ:"SE Basics",q:"What does 'Software Evolution' mean?",a:"Modifying software to reflect changing customer and market requirements",choices:["Upgrading the hardware that runs the software","Rewriting software from scratch","Modifying software to reflect changing customer and market requirements","Training users on new software"]},
{civ:"SE Basics",q:"Which of the four essential attributes of good software ensures it does not waste system resources?",a:"Efficiency",choices:["Maintainability","Dependability","Acceptability","Efficiency"]},
{civ:"SE Basics",q:"What does 'Maintainability' mean as a software attribute?",a:"Software should be written so it can evolve to meet changing customer needs",choices:["The software runs without crashing","Software should be written so it can evolve to meet changing customer needs","The software is protected from hackers","The software is easy to learn for new users"]},
{civ:"SE Basics",q:"Why is it usually cheaper in the long run to use software engineering methods?",a:"The majority of costs come from changing software after it has gone into use, which SE methods handle better",choices:["SE methods eliminate the need for testing","SE methods reduce the number of developers needed","The majority of costs come from changing software after it has gone into use, which SE methods handle better","SE methods prevent all bugs from occurring"]},
{civ:"SE Basics",q:"What is 'Heterogeneity' as a general issue affecting software?",a:"Systems required to operate as distributed systems across networks with different types of computers and mobile devices",choices:["Software written in multiple programming languages","Systems required to operate as distributed systems across networks with different types of computers and mobile devices","Having multiple development teams","Using different databases simultaneously"]},
{civ:"SE Basics",q:"What does the 'Scale' issue in software engineering refer to?",a:"Software must be developed across a very wide range of scales, from tiny embedded systems to Internet-scale cloud systems",choices:["The size of the development team","Software must be developed across a very wide range of scales, from tiny embedded systems to Internet-scale cloud systems","The amount of code written per day","The number of users of a system"]},
{civ:"SE Basics",q:"Which software engineering fundamental principle involves not writing new software when existing software can be used?",a:"Software reuse",choices:["Software evolution","Software validation","Software reuse","Software specification"]},
{civ:"SE Basics",q:"What is Cloud Computing in the context of Internet software engineering?",a:"An approach where applications run remotely and users pay according to use rather than buying software",choices:["Storing files on a USB drive","Writing software for weather prediction","An approach where applications run remotely and users pay according to use rather than buying software","Developing software for airline systems"]},
{civ:"SE Basics",q:"What type of application system runs on a local computer and includes all necessary functionality without needing a network?",a:"Stand-alone application",choices:["Embedded control system","Interactive transaction-based application","Stand-alone application","Batch processing system"]},
{civ:"SE Basics",q:"What are Embedded Control Systems?",a:"Software control systems that control and manage hardware devices",choices:["Systems that run on remote servers","Software control systems that control and manage hardware devices","Systems for processing data in large batches","Systems for entertainment purposes"]},

// ════════════════ SW PRODUCTS ════════════════
{civ:"SW Products",q:"What is the difference between Generic and Customized software products?",a:"Generic products are sold to any customer; customized products are commissioned by a specific customer for their own needs",choices:["Generic products are cheaper; customized ones are expensive","Generic products are sold to any customer; customized products are commissioned by a specific customer for their own needs","Generic products have more features; customized ones are simpler","There is no meaningful difference"]},
{civ:"SW Products",q:"Who owns the specification for a Generic software product?",a:"The software developer",choices:["The customer","The software developer","The government","A third-party auditor"]},
{civ:"SW Products",q:"An air traffic control system is an example of which type of software product?",a:"Customized product",choices:["Generic product","Open-source product","Customized product","Entertainment system"]},
{civ:"SW Products",q:"Which application type processes large numbers of individual inputs to create corresponding outputs?",a:"Batch processing systems",choices:["Stand-alone applications","Embedded control systems","Batch processing systems","Entertainment systems"]},
{civ:"SW Products",q:"What is a 'System of Systems'?",a:"A system composed of a number of other software systems",choices:["A very large monolithic application","A network of computers","A system composed of a number of other software systems","A distributed database"]},
{civ:"SW Products",q:"Which attribute of good software means it must be understandable, usable, and compatible with other systems?",a:"Acceptability",choices:["Efficiency","Maintainability","Dependability","Acceptability"]},
{civ:"SW Products",q:"What does web-based software engineering emphasize as the dominant approach for constructing systems?",a:"Software reuse — assembling systems from pre-existing components",choices:["Writing everything from scratch","Software reuse — assembling systems from pre-existing components","Avoiding incremental development","Using only proprietary technologies"]},
{civ:"SW Products",q:"What are Integrated Services in iLearn?",a:"Services that offer an API and can be accessed by other services through direct communication",choices:["Services accessed only through a browser","Services that require user login each time","Services that offer an API and can be accessed by other services through direct communication","Services that run offline only"]},
{civ:"SW Products",q:"What type of system collects data from sensors in its environment and sends it to other systems for processing?",a:"Data collection system",choices:["Batch processing system","Entertainment system","Data collection system","System of systems"]},

// ════════════════ ETHICS ════════════════
{civ:"Ethics",q:"What does ethical behaviour in software engineering involve beyond upholding the law?",a:"Following a set of principles that are morally correct",choices:["Making as much profit as possible","Following a set of principles that are morally correct","Keeping all information secret","Avoiding all legal obligations"]},
{civ:"Ethics",q:"What is the professional responsibility of 'Competence' for software engineers?",a:"Engineers should not misrepresent their level of competence or knowingly accept work outside their competence",choices:["Engineers must know every programming language","Engineers should always accept any project offered","Engineers should not misrepresent their level of competence or knowingly accept work outside their competence","Engineers must have a PhD"]},
{civ:"Ethics",q:"What does the 'Computer Misuse' professional responsibility cover?",a:"Software engineers should not use technical skills to misuse other people's computers, from trivial acts to spreading viruses",choices:["Using unlicensed software for personal projects","Software engineers should not use technical skills to misuse other people's computers, from trivial acts to spreading viruses","Failing to update software regularly","Not writing documentation"]},
{civ:"Ethics",q:"How many principles are in the ACM/IEEE Code of Ethics?",a:"Eight",choices:["Four","Six","Eight","Ten"]},
{civ:"Ethics",q:"Which ACM/IEEE ethical principle requires software engineers to act in the best interests of their client and employer?",a:"CLIENT AND EMPLOYER",choices:["PUBLIC","PRODUCT","CLIENT AND EMPLOYER","MANAGEMENT"]},
{civ:"Ethics",q:"Which ACM/IEEE ethical principle states software engineers shall act consistently with the public interest?",a:"PUBLIC",choices:["PUBLIC","SELF","COLLEAGUES","PROFESSION"]},
{civ:"Ethics",q:"What does the SELF principle in ACM/IEEE Code of Ethics require?",a:"Software engineers shall participate in lifelong learning and promote an ethical approach to the profession",choices:["Engineers must teach others only","Engineers should focus only on their own projects","Software engineers shall participate in lifelong learning and promote an ethical approach to the profession","Engineers should avoid professional societies"]},
{civ:"Ethics",q:"Which of these is an example of an ethical dilemma for a software engineer?",a:"Your employer releases a safety-critical system without finishing testing",choices:["Choosing between two programming languages","Deciding on a project management tool","Your employer releases a safety-critical system without finishing testing","Selecting a software license type"]},
{civ:"Ethics",q:"What is the role of professional societies like ACM and IEEE in software engineering ethics?",a:"They publish codes of conduct which set out the standards of behaviour expected of their members",choices:["They set software prices","They publish codes of conduct which set out the standards of behaviour expected of their members","They certify all software products","They employ all software engineers"]},
{civ:"Ethics",q:"The 'Intellectual Property Rights' professional responsibility means engineers should:",a:"Be aware of local laws on patents/copyright and ensure employers' intellectual property is protected",choices:["Always share all code publicly","Be aware of local laws on patents/copyright and ensure employers' intellectual property is protected","Avoid using any third-party libraries","Copy competitors' code freely"]},

// ════════════════ CASE STUDIES ════════════════
{civ:"Case Studies",q:"What makes the Insulin Pump a safety-critical system?",a:"Low blood sugars can lead to brain malfunction, coma and death; high blood sugars cause long-term eye and kidney damage",choices:["It is an expensive device","It is difficult to manufacture","Low blood sugars can lead to brain malfunction, coma and death; high blood sugars cause long-term eye and kidney damage","It connects to the internet"]},
{civ:"Case Studies",q:"What does the Insulin Pump control system do?",a:"Collects data from a blood sugar sensor, calculates required insulin, and sends signals to a micro-pump",choices:["Monitors heart rate and blood pressure","Collects data from a blood sugar sensor, calculates required insulin, and sends signals to a micro-pump","Dispenses medication based on time of day","Tracks patient movement and activity"]},
{civ:"Case Studies",q:"What is the Mentcare system?",a:"A patient information system that maintains records about patients with mental health problems and their treatments",choices:["A general hospital management system","A patient information system that maintains records about patients with mental health problems and their treatments","A pharmaceutical inventory system","A mental health research database"]},
{civ:"Case Studies",q:"What are the two key goals of the Mentcare system?",a:"Generate management information for health managers and provide medical staff with timely patient treatment information",choices:["Track medication inventory and bill patients","Generate management information for health managers and provide medical staff with timely patient treatment information","Monitor patient location and manage appointments","Store research data and publish reports"]},
{civ:"Case Studies",q:"What is a major privacy concern in the Mentcare system?",a:"Patient information must be confidential and only disclosed to authorised medical staff and the patient themselves",choices:["The system is too slow to access","Patient information must be confidential and only disclosed to authorised medical staff and the patient themselves","The system stores too much data","Patients can change their own records"]},

const TOPICS=["All","SE Basics","SW Products","Ethics","Case Studies","SW Process","Agile","Scrum Roles","Scrum Ops","Artifacts","Class Notes"];
const LETS=["A","B","C","D"];
let selTopic="All",questions=[],cur=0,score=0,answers=[],answered=false;

function shuffle(a){return[...a].sort(()=>Math.random()-0.5);}

function buildGrid(){
  const g=document.getElementById('civGrid');
  TOPICS.forEach(c=>{
    if(c==="SE Basics"){
      const s=document.createElement('div');
      s.className='topic-sep';s.textContent='— Software Engineering Ch.1 —';
      g.appendChild(s);
    }
    if(c==="SW Process"){
      const s=document.createElement('div');
      s.className='topic-sep';s.textContent='— Process Models —';
      g.appendChild(s);
    }
    if(c==="Agile"){
      const s=document.createElement('div');
      s.className='topic-sep';s.textContent='— Agile & Scrum —';
      g.appendChild(s);
    }
    if(c==="Class Notes"){
      const s=document.createElement('div');
      s.className='topic-sep';s.textContent='— Class Notes Extras —';
      g.appendChild(s);
    }
    const b=document.createElement('button');
    b.className='civ-btn'+(c==='All'?' sel':'');
    b.textContent=c;
    b.onclick=()=>{
      selTopic=c;
      document.querySelectorAll('.civ-btn').forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel');updateCount();
    };
    g.appendChild(b);
  });
  updateCount();
}

function updateCount(){
  const pool=selTopic==='All'?ALL:ALL.filter(q=>q.civ===selTopic);
  document.getElementById('countText').textContent='// '+pool.length+' questions loaded';
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function startQuiz(){
  const pool=selTopic==='All'?ALL:ALL.filter(q=>q.civ===selTopic);
  questions=shuffle(pool).map(q=>({...q,choices:shuffle(q.choices)}));
  cur=0;score=0;answers=[];answered=false;
  showScreen('quiz-screen');renderQ();
}

function renderQ(){
  answered=false;
  const q=questions[cur];
  const col=CIV_COLORS[q.civ]||'#38bdf8';
  document.getElementById('qCounter').textContent=(cur+1)+' / '+questions.length;
  const civEl=document.getElementById('qCiv');
  civEl.textContent=q.civ;civEl.setAttribute('data-civ',q.civ);
  document.getElementById('qScore').textContent=score+' pts';
  document.getElementById('qAccent').style.background=col;
  document.getElementById('progFill').style.width=(cur/questions.length*100)+'%';
  document.getElementById('qText').textContent=q.q;
  document.getElementById('fbArea').style.display='none';
  const box=document.getElementById('choicesBox');
  box.innerHTML='';
  q.choices.forEach((c,i)=>{
    const b=document.createElement('button');
    b.className='choice-btn fade-in';
    b.style.animationDelay=(i*0.07)+'s';
    b.innerHTML='<span class="clet">'+LETS[i]+'</span>'+c;
    b.onclick=()=>handleChoice(c,b,q);
    box.appendChild(b);
  });
}

function handleChoice(choice,btn,q){
  if(answered)return;
  answered=true;
  const ok=choice===q.a;
  if(ok)score++;
  answers.push({q:q.q,chosen:choice,correct:q.a,ok,civ:q.civ});
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=true;
    const txt=b.textContent.replace(/^[A-D]/,'').trim();
    if(txt===q.a){b.classList.add('correct');b.innerHTML+='<span class="chk">✓</span>';}
    else if(b===btn&&!ok){b.classList.add('wrong');b.innerHTML+='<span class="chk">✗</span>';}
  });
  const fb=document.getElementById('fbArea');
  const msg=document.getElementById('fbMsg');
  const nb=document.getElementById('nextBtn');
  fb.style.display='block';
  if(ok){msg.textContent='Correct!';msg.className='fb-msg correct';}
  else{msg.textContent='Incorrect. The answer was: '+q.a;msg.className='fb-msg wrong';}
  nb.textContent=(cur+1>=questions.length)?'See Results →':'Next →';
}

function nextQ(){
  if(cur+1>=questions.length){showResults();}
  else{cur++;renderQ();}
}

function showResults(){
  showScreen('results-screen');
  const pct=Math.round(score/questions.length*100);
  const rank=pct>=95?"Senior Engineer":pct>=85?"Software Architect":pct>=75?"Mid-Level Dev":pct>=60?"Junior Dev":pct>=40?"Intern":"Boot Camp Day 1";
  const col=pct>=95?"#38bdf8":pct>=85?"#22d3ee":pct>=75?"#86efac":pct>=60?"#f59e0b":pct>=40?"#94a3b8":"#3d4f6b";
  const pe=document.getElementById('resPct');
  pe.textContent=pct+'%';pe.style.color=col;
  const re=document.getElementById('resRank');
  re.textContent=rank;re.style.color=col;
  document.getElementById('resSub').textContent=score+' of '+questions.length+' correct';
  setTimeout(()=>{
    const b=document.getElementById('resBar');
    b.style.background='linear-gradient(to right,var(--accent2),'+col+')';
    b.style.width=pct+'%';
  },100);
  const list=document.getElementById('reviewList');
  list.innerHTML='';
  answers.forEach((a,i)=>{
    const d=document.createElement('div');
    d.className='rev-item '+(a.ok?'correct':'wrong');
    d.innerHTML=`<div class="rev-q">${i+1}. [${a.civ}] ${a.q}</div>
      <div class="rev-your ${a.ok?'correct':'wrong'}">${a.ok?'✓':'✗'} Your answer: ${a.chosen}</div>
      ${!a.ok?`<div class="rev-ans">✓ Correct: ${a.correct}</div>`:''}`;
    list.appendChild(d);
  });
}

function goHome(){showScreen('start-screen');}
buildGrid();
</script>
